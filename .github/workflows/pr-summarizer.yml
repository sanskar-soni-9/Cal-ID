name: PR Summarizer

permissions:
  contents: read
  models: read
  pull-requests: write
  issues: write

on:
  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request Number"
        required: true
        type: number

concurrency:
  group: pr-summarizer
  cancel-in-progress: false

jobs:
  prepareFilesForSummary:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Summarize PR
        id: summarize_pr
        uses: actions/github-script@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            let pr;
            if (context.eventName === "workflow_dispatch") {
              const prNumber = context.payload.inputs.pr_number;

              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              pr = data;
            } else {
              pr = context.payload.pull_request;
            }

            const inferenceEndpoint = "https://models.github.ai/inference/chat/completions";

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              }
            );

            console.log(`Total files: ${files.length}`);

            const batchSize = 10;
            const fileSummaries = [];

            async function fetchWithRetry(url, options, retries=5) {
              for (let attempt = 0; attempt < retries; attempt++) {
                const res = await fetch(url, options);

                try {
                  if (res.status === 429) {
                    throw new Error("Too many requests");
                  }

                  return await res.json();

                } catch (err) {
                  const waitTime = Math.pow(2, attempt) * 8000;
                  console.log(err);
                  console.log(`Rate limited. Retrying in ${waitTime / 1000}s...`);

                  await new Promise(r => setTimeout(r, waitTime));
                }
              }

              throw new Error("Max retries exceeded");
            }

            for (let i = 0; i < files.length; i += batchSize) {
              const batch = files.slice(i, i + batchSize);

              const prompt = batch.map(f => `
                File: ${f.filename}
                Status: ${f.status}
                Patch:
                ${f.patch ?? 'No diff available'}
              `).join('\n\n');

              const res = await fetchWithRetry(
                inferenceEndpoint,
                {
                  method: "POST",
                  headers: {
                    "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`,
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    model: "gpt-4.1-mini",
                    messages: [
                      {
                        role: "system",
                        content: "Summarize each file diff in 1–3 concise bullet points."
                      },
                      {
                        role: "user",
                        content: prompt
                      }
                    ],
                    max_tokens: 800,
                  }),
                }
              );

              const data = await res.json();
              const summary = data.choices?.[0]?.message?.content || "";

              console.log(summary)
              fileSummaries.push(summary);

              await new Promise((res) => setTimeout(res, 8 * 1000));
            }

            const combinedSummaries = fileSummaries.join("\n\n");

            const finalRes = await fetch(
              inferenceEndpoint,
              {
                method: "POST",
                headers: {
                  "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`,
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  model: "gpt-4.1-mini",
                  messages: [
                    {
                      role: "system",
                      content: `
                        You are a senior software engineer and product-minded communicator.

                        You are given:
                        1. Pull request title
                        2. Pull request description
                        3. File-level summaries (derived from code diffs)

                        Your job is to produce a clear, structured PR summary

                        ---

                        IMPORTANT:
                        - File summaries reflect the actual code changes → TRUST THEM MOST
                        - PR description reflects intent → use it for context
                        - If description and code conflict → prioritize file summaries
                        - Ignore low-signal or repetitive changes

                        ---

                        TASK:

                        0. DETERMINE USER IMPACT (CRITICAL STEP)
                        - Decide FIRST whether the PR affects:
                          - end users
                          - product behavior
                          - external APIs

                        - If changes are limited to ANY of the following:
                          - CI/CD (GitHub Actions, pipelines, build systems)
                          - tests, mocks, fixtures
                          - linting, formatting
                          - internal refactoring with no behavior change
                          - internal developer tooling, configs, dependency updates
                          - documentation-only changes

                          → THEN mark as: NO_USER_IMPACT

                        - If NO_USER_IMPACT:
                          - You MUST output:
                            Product Impact: "No relevant changes."
                          - Do NOT infer or speculate indirect benefits
                          - Do NOT mention reliability, performance, maintainability, or stability
                          - Do NOT try to justify value

                        - When unsure → default to NO_USER_IMPACT

                        ---

                        1. UNDERSTAND THE PR:
                        - Infer the real purpose of the change
                        - Connect related file-level changes into a coherent story
                        - Identify whether this is a:
                          (feature | improvement | bugfix | refactor | infra)

                        ---

                        2. PRODUCE ONLY THESE TWO SECTIONS:

                        ### 1. Product Impact
                        - ONLY include if there is clear, direct, user-visible impact
                        - Focus on:
                          - user experience
                          - product capability
                          - observable behavior
                        - If no clear user impact → output EXACTLY:
                          No relevant changes.

                        ---

                        ### 2. Classification
                        - Type: (feature | improvement | bugfix | refactor | infra)
                        - Impact Level: (low | medium | high)

                        ---

                        FORMAT (STRICT MARKDOWN):

                        ## 🧠 PR Summary
                        ### ✨ Product Impact
                        <content OR "No relevant changes.">

                        ### 🏷️ Classification
                        - Type: ...
                        - Impact Level: ...

                        ---

                        RULES:

                        - Be concise but meaningful
                        - Do NOT repeat file summaries verbatim
                        - Do NOT dump raw technical details
                        - Avoid vague phrases like "enhanced system" or "improved performance"
                        - NEVER infer user impact from internal-only changes
                        - CI/CD, GitHub Actions, pipelines → ALWAYS "No relevant changes"
                        - Refactors without behavior change → ALWAYS "No relevant changes"
                        - Do NOT include code blocks
                        - Do NOT output JSON

                        ---

                        GOAL:

                        The summary should be understandable by product end users, while remaining strictly accurate about whether any real user impact exists.
                      `
                    },
                    {
                      role: "user",
                      content: `
                        PR TITLE:
                        ${pr.title}

                        PR DESCRIPTION:
                        ${pr.body}

                        FILE SUMMARIES:
                        ${combinedSummaries}

                        Follow best practices: concise, high-signal, no fluff.
                      `
                    }
                  ],
                  max_tokens: 1500,
                }),
              }
            );

            const finalData = await finalRes.json();
            const finalSummary = finalData.choices?.[0]?.message?.content;

            console.log("\n\n\n")
            console.log(finalSummary)

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: finalSummary,
            });

            console.log("PR summary posted!");
